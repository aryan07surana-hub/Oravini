services:
  - type: web
    name: oravini
    runtime: node
    region: oregon
    branch: main
    buildCommand: npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: APP_URL
        value: https://oravini.com
    healthCheckPath: /api/auth/me
    autoDeploy: true
