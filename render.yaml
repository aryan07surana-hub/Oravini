services:
  # PostgreSQL Database
  - type: pserv
    name: oravini-db
    plan: free
    region: oregon
    databaseName: oravini
    databaseUser: oravini

  # Web Service
  - type: web
    name: oravini
    runtime: node
    buildCommand: npm install --include=dev --legacy-peer-deps && node script/build.mjs
    startCommand: NODE_ENV=production node dist/index.cjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22.22.0
      - key: DATABASE_URL
        fromDatabase:
          name: oravini-db
          property: connectionString
      - key: APP_URL
        value: https://oravini.com
      - key: SESSION_SECRET
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: YOUTUBE_CLIENT_ID
        sync: false
      - key: YOUTUBE_CLIENT_SECRET
        sync: false
      - key: ULAMA_API_KEY
        sync: false
      - key: META_ACCESS_TOKEN
        sync: false
      - key: APIFY_TOKEN
        sync: false
      - key: PLATFORM_SMTP_HOST
        value: email-smtp.us-east-1.amazonaws.com
      - key: PLATFORM_SMTP_PORT
        value: "587"
      - key: PLATFORM_SMTP_USER
        sync: false
      - key: PLATFORM_SMTP_PASS
        sync: false
